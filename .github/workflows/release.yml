name: Release Buckets

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Select version
        required: true
        type: choice
        options:
          - major
          - minor
          - patch
      prerelease:
        description: Publish as prerelease (auto-generates -preview label)
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump module version
        id: bump
        shell: pwsh
        env:
          IS_PRERELEASE: ${{ github.event.inputs.prerelease }}
        run: |
          $ErrorActionPreference = "Stop"
          $isPrerelease = $env:IS_PRERELEASE -eq 'true'

          $manifestPath = "Buckets/Buckets.psd1"

          if (!(Test-Path $manifestPath)) {
            throw "Module manifest not found at '$manifestPath'."
          }

          $manifestMetadata = Test-ModuleManifest -Path $manifestPath
          $currentVersion = [string]$manifestMetadata.Version

          if ([string]::IsNullOrWhiteSpace($currentVersion)) {
            throw "Module manifest '$manifestPath' does not contain a valid Version value."
          }

          # Check if the manifest was already bumped in the latest commit
          $diff = git diff HEAD~1 HEAD -- $manifestPath
          $alreadyBumped = $diff -match "^[+-]\s*ModuleVersion\s*="

          if ($alreadyBumped) {
            Write-Host "Manifest version already bumped to $currentVersion in latest commit. Skipping bump."
            $newVersion = $currentVersion
          } else {
            $match = [regex]::Match($currentVersion, '^(?<major>\d+)\.(?<minor>\d+)\.(?<patch>\d+)$')
            if (!$match.Success) {
              throw "Current version '$currentVersion' is not valid semver (major.minor.patch)."
            }

            $major = [int]$match.Groups["major"].Value
            $minor = [int]$match.Groups["minor"].Value
            $patch = [int]$match.Groups["patch"].Value

            $releaseType = "${{ github.event.inputs.release_type }}"
            switch ($releaseType) {
              "major" {
                $major++
                $minor = 0
                $patch = 0
              }
              "minor" {
                $minor++
                $patch = 0
              }
              "patch" {
                $patch++
              }
              default {
                throw "Unsupported release type '$releaseType'."
              }
            }

            $newVersion = "$major.$minor.$patch"
            $manifestContent = Get-Content -Path $manifestPath -Raw
            $updatedManifestContent = [regex]::Replace(
              $manifestContent,
              "(?m)^ModuleVersion\s*=\s*'[^']+'",
              "ModuleVersion = '$newVersion'"
            )

            if ($manifestContent -eq $updatedManifestContent) {
              throw "Could not update ModuleVersion in '$manifestPath'."
            }

            Set-Content -Path $manifestPath -Value $updatedManifestContent -Encoding UTF8
          }

          # Set or remove Prerelease key in PSData
          $finalContent = Get-Content -Path $manifestPath -Raw
          if ($isPrerelease) {
            $finalContent = $finalContent.Replace("        # Prerelease = ''", "        Prerelease = 'preview'")
          } else {
            $finalContent = $finalContent.Replace("        Prerelease = 'preview'", "        # Prerelease = ''")
          }
          Set-Content -Path $manifestPath -Value $finalContent -Encoding UTF8

          $label = if ($isPrerelease) { "$newVersion-preview" } else { "$newVersion" }
          "new_version=$newVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "new_version_label=$label" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Publish module to PowerShell Gallery
        shell: pwsh
        env:
          PWSH_GALLERY_TOKEN: ${{ secrets.PWSH_GALLERY_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"

          if ([string]::IsNullOrWhiteSpace($env:PWSH_GALLERY_TOKEN)) {
            throw "Missing secret 'PWSH_GALLERY_TOKEN'."
          }

          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Publish-Module -Path "./Buckets" -NuGetApiKey $env:PWSH_GALLERY_TOKEN

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.new_version_label }}
          name: Buckets v${{ steps.bump.outputs.new_version_label }}
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          generate_release_notes: true

      - name: Commit bumped version files
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Buckets/Buckets.psd1

          if git diff --cached --quiet; then
            echo "No version changes to commit."
            exit 0
          fi

          git commit -m "chore(release): bump Buckets to ${{ steps.bump.outputs.new_version_label }}"
          git push
